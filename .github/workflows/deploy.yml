name: Deploy Lovable Site

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build project
        run: bun run build

      - name: Auto-Detect Output Directory
        id: detect-path
        run: |
          if [ -d "dist" ]; then
            echo "target_path=dist" >> $GITHUB_ENV
          elif [ -d ".output/public" ]; then
            echo "target_path=.output/public" >> $GITHUB_ENV
          elif [ -d "output/public" ]; then
            echo "target_path=output/public" >> $GITHUB_ENV
          else
            echo "target_path=." >> $GITHUB_ENV
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ env.target_path }}

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
